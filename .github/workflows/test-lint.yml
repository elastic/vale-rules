name: Test Lint Action

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same PR
concurrency:
  group: test-lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-lint:
    name: Test (${{ matrix.style_source }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - style_source: released
            use_local_styles: 'false'
          - style_source: local
            use_local_styles: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Need full history for git diff in line range calculation
          fetch-depth: 0

      - name: Run lint action
        id: lint
        uses: ./lint
        with:
          files: .github/test-fixtures/sample-violations.md
          fail_on_error: 'false'
          use_local_styles: ${{ matrix.use_local_styles }}
          disable_telemetry: 'true'
          upload_artifact: 'false'  # Skip internal upload, we handle it below
          debug: 'true'

      - name: Verify report was generated
        run: |
          if [ ! -f vale_report.md ]; then
            echo "::error::vale_report.md was not generated"
            exit 1
          fi
          echo "✓ vale_report.md exists"
          echo "Report contents:"
          cat vale_report.md

      - name: Verify issues were found
        run: |
          if [ ! -f issue_counts.txt ]; then
            echo "::error::issue_counts.txt was not generated"
            exit 1
          fi

          source issue_counts.txt
          total=$((errors + warnings + suggestions))

          echo "Found: $errors errors, $warnings warnings, $suggestions suggestions"

          # sample-violations.md should trigger multiple issues
          if [ "$total" -eq 0 ]; then
            echo "::error::Expected issues in sample-violations.md but found none"
            exit 1
          fi

          echo "✓ Issues detected as expected (total: $total)"

      - name: Verify specific rules are working
        run: |
          echo "Checking that key rules fired..."
          
          # These rules should all trigger on sample-violations.md
          rules_to_check=(
            "Elastic.Articles"
            "Elastic.BritishSpellings"
            "Elastic.WordChoice"
            "Elastic.OxfordComma"
            "Elastic.Wordiness"
            "Elastic.DontUse"
            "Elastic.Exclamation"
          )
          
          failed=0
          for rule in "${rules_to_check[@]}"; do
            if grep -q "$rule" vale_report.md; then
              echo "✓ $rule fired"
            else
              echo "::error::$rule did not fire - rule may be broken"
              failed=1
            fi
          done
          
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          
          echo "✓ All key rules verified"

      - name: Verify vocab words don't break rules
        run: |
          # The test file has "Use a HTML Dashboard to view the Analytics data."
          # where Dashboard and Analytics are vocab words. The Articles rule
          # should still fire on "a HTML".
          
          # Count how many times Articles fires (should be at least 4: FAQ, HTML, SQL, and vocab test)
          articles_count=$(grep -c "Elastic.Articles" vale_report.md || echo "0")
          
          if [ "$articles_count" -ge 4 ]; then
            echo "✓ Elastic.Articles fired $articles_count times (including vocab word test)"
          else
            echo "::error::Expected at least 4 Articles violations but found $articles_count"
            echo "Vocab words may be breaking the rule"
            exit 1
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.style_source }}
          path: |
            vale_report.md
            issue_counts.txt
          retention-days: 5

  # Run Python unit tests for supporting scripts
  test-python:
    name: Test Python scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run path_filter tests
        working-directory: lint
        run: python3 -m unittest test_path_filter -v

  # Test that clean files produce no issues (no false positives)
  test-clean-file:
    name: Test clean file (no false positives)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run lint on clean file
        id: lint-clean
        uses: ./lint
        with:
          files: .github/test-fixtures/clean-doc.md
          fail_on_error: 'true'  # Should pass since file is clean
          use_local_styles: 'true'
          disable_telemetry: 'true'
          upload_artifact: 'false'
          debug: 'true'

      - name: Verify no issues found
        run: |
          if [ ! -f issue_counts.txt ]; then
            echo "::error::issue_counts.txt was not generated"
            exit 1
          fi

          source issue_counts.txt
          total=$((errors + warnings + suggestions))

          if [ "$total" -gt 0 ]; then
            echo "::error::Clean file should have 0 issues but found $total"
            echo "Report contents:"
            cat vale_report.md
            exit 1
          fi

          echo "✓ Clean file correctly produced no issues"

  # Test include_paths filtering
  test-include-paths:
    name: Test include_paths filtering
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run lint with include_paths filter
        id: lint-filtered
        uses: ./lint
        with:
          files: .github/test-fixtures/team-a/doc.md .github/test-fixtures/team-b/doc.md
          include-paths: .github/test-fixtures/team-a
          fail_on_error: 'false'
          use_local_styles: 'true'
          disable_telemetry: 'true'
          upload_artifact: 'false'
          debug: 'true'

      - name: Verify filtering worked
        run: |
          if [ ! -f vale_report.md ]; then
            echo "::error::vale_report.md was not generated"
            exit 1
          fi

          # Check that team-a is in the report but team-b is not
          if grep -q "team-a" vale_report.md; then
            echo "✓ team-a files were linted"
          else
            echo "::error::team-a files should have been linted"
            exit 1
          fi

          if grep -q "team-b" vale_report.md; then
            echo "::error::team-b files should have been filtered out"
            exit 1
          else
            echo "✓ team-b files were correctly filtered out"
          fi

  # Test negation patterns in include-paths
  test-include-paths-negation:
    name: Test include_paths negation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run lint with negation pattern
        id: lint-negation
        uses: ./lint
        with:
          files: .github/test-fixtures/team-a/doc.md .github/test-fixtures/team-a/excluded/doc.md
          include-paths: |
            .github/test-fixtures/team-a/**
            !.github/test-fixtures/team-a/excluded/**
          fail_on_error: 'false'
          use_local_styles: 'true'
          disable_telemetry: 'true'
          upload_artifact: 'false'
          debug: 'true'

      - name: Verify negation filtering worked
        run: |
          if [ ! -f vale_report.md ]; then
            echo "::error::vale_report.md was not generated"
            exit 1
          fi

          # team-a/doc.md should be included
          if grep -q "team-a/doc.md" vale_report.md; then
            echo "✓ team-a/doc.md was linted"
          else
            echo "::error::team-a/doc.md should have been linted"
            exit 1
          fi

          # team-a/excluded/doc.md should be excluded by negation
          if grep -q "team-a/excluded" vale_report.md; then
            echo "::error::team-a/excluded/doc.md should have been excluded by negation"
            exit 1
          else
            echo "✓ team-a/excluded/doc.md was correctly excluded by negation"
          fi

  test-repo-override:
    name: Test repo-level Vale overrides
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run lint without override (spelling should be off by default)
        id: lint-no-override
        uses: ./lint
        with:
          files: .github/test-fixtures/spelling-test.md
          fail_on_error: 'false'
          use_local_styles: 'true'
          disable_telemetry: 'true'
          upload_artifact: 'false'
          debug: 'true'

      - name: Verify spelling did NOT fire without override
        run: |
          if [ ! -f vale_report.md ]; then
            echo "::error::vale_report.md was not generated"
            exit 1
          fi

          if grep -q "Elastic.Spelling" vale_report.md; then
            echo "::error::Elastic.Spelling fired without an override — it should be off by default"
            exit 1
          fi

          echo "✓ Elastic.Spelling correctly disabled by default"
          rm -f vale_report.md issue_counts.txt

      - name: Place override file in repo root
        run: cp .github/test-fixtures/vale-overrides/.vale-overrides.ini .vale-overrides.ini

      - name: Run lint with override (spelling should fire)
        id: lint-override
        uses: ./lint
        with:
          files: .github/test-fixtures/spelling-test.md
          fail_on_error: 'false'
          use_local_styles: 'true'
          disable_telemetry: 'true'
          upload_artifact: 'false'
          debug: 'true'

      - name: Verify spelling fired via override
        run: |
          if [ ! -f vale_report.md ]; then
            echo "::error::vale_report.md was not generated"
            exit 1
          fi

          spelling_count=$(grep -c "Elastic.Spelling" vale_report.md || echo "0")

          if [ "$spelling_count" -ge 2 ]; then
            echo "✓ Elastic.Spelling fired $spelling_count times via .vale-overrides.ini"
          else
            echo "::error::Expected at least 2 Elastic.Spelling hits from repo override but found $spelling_count"
            echo "Report contents:"
            cat vale_report.md
            exit 1
          fi

  # This job runs after all matrix jobs complete to upload a single artifact
  # that the report action can download
  upload-results:
    name: Upload combined results
    runs-on: ubuntu-latest
    needs: [test-lint, test-clean-file, test-include-paths, test-include-paths-negation, test-repo-override]
    if: always() && needs.test-lint.result == 'success'

    steps:
      - name: Download local styles results
        uses: actions/download-artifact@v8
        with:
          name: test-results-local

      - name: Upload as vale-results for report action
        uses: actions/upload-artifact@v7
        with:
          name: vale-results
          path: |
            vale_report.md
            issue_counts.txt
          retention-days: 1
